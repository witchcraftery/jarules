# config/llm_config.yaml

# List of available LLM configurations
llm_configs:
  - id: "gemini_flash_default" # Unique identifier for this configuration
    provider: "gemini"        # Maps to the connector class (e.g., GeminiClient)
    description: "Default Google Gemini 1.5 Flash model."
    enabled: true             # Allows disabling a config without removing it
    model_name: "gemini-1.5-flash-latest"
    api_key_env: "GEMINI_API_KEY" # Environment variable that holds the API key
    default_system_prompt: "You are a helpful and concise AI assistant." # Optional
    generation_params:        # Optional: common generation parameters
      temperature: 0.7
      # max_output_tokens: 2048 # Example, Gemini uses specific naming

  - id: "gemini_pro_strict"
    provider: "gemini"
    description: "Google Gemini Pro model with stricter code generation prompt."
    enabled: true
    model_name: "gemini-1.0-pro" # Or relevant pro model
    api_key_env: "GEMINI_API_KEY"
    default_system_prompt: |
      You are an expert AI coding assistant.
      Please provide only the code requested by the user, without any additional explanatory text,
      markdown formatting, or language indicators (like ```python) surrounding the code block.
      If you need to include comments, ensure they are within the code block itself (e.g., using # for Python).
    generation_params:
      temperature: 0.3

  # --- Placeholder Examples (Non-Functional until connectors are built) ---

  - id: "ollama_llama3_default"
    provider: "ollama"
    description: "Default local Llama3 model via Ollama."
    enabled: true
    model_name: "llama3" # Or your preferred default Llama model
    base_url: "http://localhost:11434" # Typical Ollama local endpoint
    default_system_prompt: "You are a helpful AI assistant." # Optional
    generation_params:
      temperature: 0.7
      num_ctx: 2048 # Context window size
      # top_k: 40
      # top_p: 0.9

  - id: "ollama_codellama_7b_instruct"
    provider: "ollama"
    description: "Local CodeLlama 7B Instruct model via Ollama for code generation."
    enabled: true
    model_name: "codellama:7b-instruct" # Or codellama:latest if preferred
    base_url: "http://localhost:11434"
    default_system_prompt: |
      You are an expert AI coding assistant.
      Please provide only the code requested by the user, without any additional explanatory text,
      markdown formatting, or language indicators (like ```python) surrounding the code block.
      If you need to include comments, ensure they are within the code block itself (e.g., using # for Python).
    generation_params:
      temperature: 0.2
      num_ctx: 4096 # Larger context for code
      # stop: ["
```
", "
```python
"] # Example stop sequences for code

  - id: "openrouter_mistralai_mistral_7b_instruct" # More specific ID
    provider: "openrouter"
    description: "Mistral 7B Instruct via OpenRouter."
    enabled: true
    model_name: "mistralai/mistral-7b-instruct" # Exact model ID from OpenRouter
    api_key_env: "OPENROUTER_API_KEY"
    http_referer: "https://github.com/JaRules/jarules" # Example, use actual or desired value
    app_name: "JaRules Agent" # Example, use actual or desired value
    default_system_prompt: "You are a helpful AI assistant accessed via OpenRouter." # Optional
    generation_params:
      temperature: 0.7
      # max_tokens: 1024 # Example

  - id: "openrouter_openai_gpt_3_5_turbo"
    provider: "openrouter"
    description: "OpenAI GPT-3.5 Turbo via OpenRouter."
    enabled: true
    model_name: "openai/gpt-3.5-turbo" # Exact model ID from OpenRouter
    api_key_env: "OPENROUTER_API_KEY"
    http_referer: "https://github.com/JaRules/jarules" # Example
    app_name: "JaRules Agent" # Example
    default_system_prompt: "You are OpenAI's GPT-3.5-Turbo, accessed via OpenRouter." # Optional
    generation_params:
      temperature: 0.7
      # top_p: 0.9

# --- End of Placeholder Examples ---

